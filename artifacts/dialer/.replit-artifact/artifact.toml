kind = "web"
previewPath = "/"
title = "Outbound Call Campaign"
version = "1.0.0"
id = "artifacts/dialer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20712

[services.development]
run = "pnpm --filter @workspace/dialer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dialer", "run", "build" ]
publicDir = "artifacts/dialer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20712"
BASE_PATH = "/"
